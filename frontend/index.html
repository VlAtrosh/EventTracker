<!DOCTYPE html>
<html>
<head>
    <title>EventFlow</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Авторизация -->
    <div id="page-auth">
        <div class="card">
            <h1>EventFlow</h1>
            <div class="tabs">
                <button class="tab active" data-tab="login">Вход</button>
                <button class="tab" data-tab="register">Регистрация</button>
            </div>
            
            <form id="login-form">
                <input id="login-username" placeholder="Логин">
                <input id="login-password" type="password" placeholder="Пароль">
                <button type="submit">Войти</button>
            </form>
            
            <form id="register-form" class="hidden">
                <input id="reg-username" placeholder="Логин">
                <input id="reg-email" placeholder="Email">
                <input id="reg-password" type="password" placeholder="Пароль">
                <button type="submit">Зарегистрироваться</button>
            </form>
        </div>
    </div>

    <!-- Основное приложение -->
    <div id="page-app" class="hidden">
        <header>
            <h2>EventFlow</h2>
            <div>
                <span id="user-name"></span>
                <span id="user-role"></span>
                <button id="logout-btn">Выйти</button>
            </div>
        </header>
        
        <div class="nav-tabs">
            <button class="nav-tab active" data-view="events">Мероприятия</button>
            <button class="nav-tab" data-view="my">Мои</button>
            <button class="nav-tab admin-only hidden" data-view="create">Создать</button>
        </div>
        
        <div id="main-content"></div>
    </div>
    
    <script src="app.js"></script>
</body>
</html>
