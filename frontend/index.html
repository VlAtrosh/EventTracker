<!doctype html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Event Management System</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Страница авторизации -->
    <div id="page-auth" class="page">
        <div class="card">
            <h1 class="logo">🎯 Event Manager</h1>
            <div class="tabs">
                <button class="tab active" data-tab="login">Вход</button>
                <button class="tab" data-tab="register">Регистрация</button>
            </div>
            
            <form id="login-form" class="auth-form">
                <div class="field">
                    <span>Логин</span>
                    <input id="login-username" type="text" placeholder="username">
                </div>
                <div class="field">
                    <span>Пароль</span>
                    <input id="login-password" type="password" placeholder="••••••">
                </div>
                <button type="submit" class="btn btn-primary">Войти</button>
                <p class="form-error" id="login-error"></p>
            </form>
            
            <form id="register-form" class="auth-form hidden">
                <div class="field">
                    <span>Логин</span>
                    <input id="reg-username" type="text" placeholder="username">
                </div>
                <div class="field">
                    <span>Email</span>
                    <input id="reg-email" type="email" placeholder="email@example.com">
                </div>
                <div class="field">
                    <span>Пароль (мин. 6 символов)</span>
                    <input id="reg-password" type="password" placeholder="••••••">
                </div>
                <button type="submit" class="btn btn-primary">Зарегистрироваться</button>
                <p class="form-error" id="reg-error"></p>
                <p class="form-success" id="reg-success"></p>
            </form>
        </div>
    </div>

    <!-- Основное приложение -->
    <div id="page-app" class="page hidden">
        <header class="header">
            <div class="header-title">🎯 Event Manager</div>
            <div class="header-user">
                <span id="user-name"></span>
                <span class="badge" id="user-role"></span>
                <button id="logout-btn" class="btn btn-outline-small">Выйти</button>
            </div>
        </header>
        
        <nav class="nav-tabs">
            <button class="nav-tab active" data-view="events">Все мероприятия</button>
            <button class="nav-tab" data-view="my">Мои мероприятия</button>
            <button class="nav-tab admin-only hidden" data-view="create">Создать мероприятие</button>
        </nav>
        
        <main id="main-content">
            <!-- Контент будет загружаться динамически -->
        </main>
    </div>
    
    <script src="app.js"></script>
</body>
</html>
